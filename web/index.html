<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDaD → SFIA 9 Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
:root {
  --ink-black:       #001219;
  --golden-orange:   #c97a00;
  --brown-red:       #9b2226;
  --sage-light:      #bad8c4;
  --sage-mid:        #60a478;
  --sage-dark:       #1e6038;
  --stone-light:     #f3f1ee;
  --stone-mid:       #d8d2c8;
  --stone-dark:      #b0a898;
  --accent:          #3a8455;
  --text:            #1e2420;
  --text-mid:        #3a5a48;
  --text-light:      #6a8570;
  --border:          #d8d2c8;
  --bg:              #ffffff;
  --panel-bg:        #ffffff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }
#header { background: #1e6038; color: #fff; padding: 10px 22px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; flex-shrink: 0; border-bottom: 3px solid #60a478; }
.hdr-brand { display: flex; flex-direction: column; justify-content: center; gap: 2px; }
#header h1 { display: flex; align-items: center; gap: 10px; font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif; font-size: 26px; font-weight: 700; white-space: nowrap; letter-spacing: .02em; line-height: 1; }
.hdr-badge { background: #d8d2c8; color: #1e4030; font-size: 0.46em; font-weight: 800; letter-spacing: .1em; padding: 0.22em 0.6em; border-radius: 0.3em; text-transform: uppercase; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; vertical-align: middle; flex-shrink: 0; }
.hdr-subtitle { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: .08em; text-transform: uppercase; font-weight: 500; white-space: nowrap; }
.search-wrap { position: relative; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 6px; padding: 5px 12px; margin-left: auto; }
.search-wrap:focus-within { background: rgba(255,255,255,0.28); border-color: rgba(255,255,255,0.7); }
#search-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 6px 20px rgba(0,18,25,0.14); z-index: 1000; overflow: hidden; display: none; min-width: 320px; }
#search-dropdown.open { display: block; }
.sd-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; font-size: 14px; color: var(--text); border-bottom: 1px solid #f5efd5; }
.sd-item:last-child { border-bottom: none; }
.sd-item:hover, .sd-item.sd-focus { background: #f3f1ee; }
.sd-badge { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; }
.sd-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sd-empty { padding: 10px 12px; font-size: 13px; color: var(--text-light); }
#search { border: none; background: none; outline: none; font-size: 15px; width: 380px; color: #fff; }
#search::placeholder { color: rgba(255,255,255,0.55); }
#search:focus { outline: none; }
button { padding: 6px 13px; border-radius: 6px; border: 1px solid rgba(0,18,25,0.25); font-size: 14px; cursor: pointer; background: rgba(255,255,255,0.35); color: #001219; transition: background .15s, border-color .15s; }
button:hover { background: #eeecea; border-color: var(--stone-dark); }
#button-column button { background: #3a8455; color: #fff; border: 1px solid #2d6642; font-size: 13px; font-weight: 600; }
#button-column button:hover { background: #2d6642; border-color: #226038; }
#button-column button.snap-active { background: #1e6038; border-color: #144828; color: #bad8c4; }
#button-column button.snap-active:hover { background: #144828; }
#control-row { display: flex; flex-shrink: 0; border-bottom: 2px solid var(--border); }
#filter-column { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.filter-row { display: flex; align-items: center; background: #f5f8fa; border-bottom: 1px solid var(--border); min-height: 34px; padding: 4px 0; }
.filter-row:last-child { border-bottom: none; }
.filter-label { width: 110px; min-width: 110px; padding-left: 22px; font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--text-light); white-space: nowrap; flex-shrink: 0; }
.filter-chips { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; flex: 1; padding: 2px 8px 2px 0; }
#button-column { width: 500px; min-width: 500px; flex-shrink: 0; border-left: 1px solid var(--border); background: #f5f8fa; display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 6px; padding: 8px 18px; }
#button-column button { min-width: 170px; text-align: center; }
.filter-chip { padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: var(--text-mid); transition: background .12s, border-color .12s; white-space: nowrap; }
.family-chip { padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: var(--text-mid); transition: background .12s, border-color .12s; white-space: nowrap; }
.family-chip:hover { background: #e2efe8; border-color: #8ec0a0; }
.family-chip--active { background: #8ec0a0; border-color: #8ec0a0; color: #1e4030; font-weight: 700; }
.role-chip { padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: var(--text-mid); transition: background .12s, border-color .12s; white-space: nowrap; }
.role-chip:hover { background: #c8e4d0; border-color: #3a8455; }
.role-chip--active { background: #3a8455; border-color: #3a8455; color: #fff; font-weight: 700; }
.band-chip { padding: 3px 11px; border-radius: 20px; border: 1px solid var(--border); font-size: 12px; font-weight: 600; cursor: pointer; background: #fff; color: var(--text-mid); transition: background .12s, border-color .12s; white-space: nowrap; }
.band-chip:hover { background: #b0d4bc; border-color: #1e6038; }
.band-chip--active { background: #1e6038; border-color: #1e6038; color: #fff; font-weight: 700; }
.band-chip--unavailable { opacity: 0.25; pointer-events: none; }
#main { display: flex; flex: 1; min-height: 0; }
#tree-panel { flex: 1; overflow: hidden; position: relative; background: var(--bg); }
#tree-svg { display: block; width: 100%; height: 100%; }
#detail-panel { width: 500px; flex-shrink: 0; background: var(--panel-bg); border-left: 1px solid var(--border); overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
#detail-panel.hidden { display: none; }
.detail-type { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--golden-orange); }
.detail-title { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 25px; font-weight: 600; line-height: 1.2; color: var(--text); padding: 4px 0 2px; }
.detail-family { font-size: 17px; font-weight: 500; color: var(--text-mid); line-height: 1.4; }
.detail-section { border-top: 1px solid var(--border); padding-top: 10px; padding-bottom: 6px; }
.detail-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-light); margin-bottom: 7px; }
.sfia-chip { display: flex; align-items: center; gap: 7px; background: #f8f7f5; border: 1px solid #e4dfd8; border-radius: 7px; padding: 5px 10px; margin: 3px 0; font-size: 14px; color: var(--text); }
.sfia-chip .code { font-weight: 700; color: var(--accent); font-size: 13px; white-space: nowrap; }
.nav-code { background: none; border: none; padding: 0; font: inherit; cursor: pointer; }
.nav-code:hover { text-decoration: underline; opacity: 0.75; }
.range-badge { display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; }
.lvl-pip { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; color: #fff; font-size: 12px; font-weight: 700; }
.range-sep { font-size: 13px; color: var(--text-light); font-weight: 400; }
.cap-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 14px; border-bottom: 1px solid #f5edd8; color: var(--text); }
.gov-level-tag { font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; background: #e2efe8; color: #1e4030; white-space: nowrap; flex-shrink: 0; }
.cap-chip { display: flex; align-items: center; gap: 7px; background: #f3f1ee; border: 1px solid #d8d2c8; border-radius: 7px; padding: 5px 10px; margin: 3px 0; font-size: 14px; color: var(--text); }
.cap-chip--broad { background: #eeecea; border-color: #cdc8c0; }
.cap-group { margin-bottom: 5px; }
.skills-rail { margin-left: 9px; padding-left: 10px; border-left: 2px solid #d8d2c8; border-radius: 0; margin-top: 3px; }
.nav-chip { display: flex; align-items: center; gap: 6px; padding: 6px 10px; margin: 2px 0; border-radius: 6px; font-size: 15px; cursor: pointer; color: var(--text); background: #f3f1ee; border: 1px solid #d8d2c8; transition: background .12s, border-color .12s; }
.nav-chip:hover { background: #eeecea; border-color: #c8c0b4; }
.gov-level-pip { display: inline-flex; align-items: center; justify-content: center; min-width: 22px; height: 20px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: .02em; flex-shrink: 0; padding: 0 4px; }
.gov-lvl-awareness    { background: #e2efe8; color: #1e4030; }
.gov-lvl-working      { background: #8ec0a0; color: #fff; }
.gov-lvl-practitioner { background: #3a8455; color: #fff; }
.gov-lvl-expert       { background: #0a4025; color: #fff; }
.gov-lvl-master       { background: #062918; color: #fff; }
#close-detail { align-self: flex-end; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-light); padding: 0; line-height: 1; }
#close-detail:hover { color: var(--text); }
.node .node-shape { cursor: pointer; stroke-width: 2px; transition: filter .15s; }
.node:hover > .node-shape { filter: brightness(1.12) drop-shadow(0 2px 6px rgba(0,0,0,0.18)); }
.node text { font-size: 16px; dominant-baseline: central; cursor: pointer; pointer-events: none; fill: var(--text); }
.node.root > text { font-weight: 700; font-size: 19px; fill: var(--ink-black); }
.node.role_family > text { font-weight: 700; font-size: 17px; fill: var(--text); }
.node.role > text { font-weight: 600; fill: var(--text); }
.node.role_level > text { fill: var(--text); }
.node.government_capability > text { font-size: 15px; fill: var(--text-mid); }
.node.broadly-accepted > text { font-weight: 600; fill: #144828; }
.node.sfia_skill > text { font-size: 15px; fill: var(--text-mid); }
.link { fill: none; stroke-width: 2px; }
.node.highlight > .node-shape { stroke: #3a8455 !important; stroke-width: 3px !important; filter: drop-shadow(0 0 5px rgba(58,132,85,0.7)); }
.node.dimmed { opacity: .18; }
.node { transition: opacity .18s ease; }
.node.branch-dim { opacity: 0.1; }
.link { transition: opacity .18s ease; }
.link.link-dim { opacity: 0.08; }
#legend { position: absolute; bottom: 14px; left: 14px; background: rgba(255,255,255,.95); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; font-size: 13px; line-height: 1.7; pointer-events: none; color: var(--text-mid); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.legend-row { display: flex; align-items: center; gap: 8px; }
.lc { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.lc-root { background: #3d3530; }
.lc-family { background: #c8c0b4; border: 1px solid #b0a898; }
.lc-role { background: #bad8c4; border: 1px solid #96c4a8; }
.lc-cap { background: #60a478; }
.lc-sfia { background: #1e6038; }
.band-selector { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 0 4px; }
.band-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 11px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-mid); transition: background .12s, border-color .12s; }
.band-pill:hover { background: #e2efe8; border-color: #3a8455; color: var(--text); }
.band-pill--active { background: #3a8455; border-color: #3a8455; color: #fff; }
</style>
</head>
<body>
<div id="header">
  <div class="hdr-brand">
    <h1><span>GDaD</span><span class="hdr-badge">SFIA 9</span></h1>
    <p class="hdr-subtitle">Government Digital and Data &middot; Profession Framework</p>
  </div>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search" type="text" placeholder="Search roles, skills, codes…" autocomplete="off">
    <div id="search-dropdown"></div>
  </div>
</div>
<div id="control-row">
  <div id="filter-column">
    <div class="filter-row">
      <span class="filter-label">Role family</span>
      <div class="filter-chips" id="family-chips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Role</span>
      <div class="filter-chips" id="role-chips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Role level</span>
      <div class="filter-chips" id="band-chips"></div>
    </div>
  </div>
  <div id="button-column">
    <button onclick="expandAll()">Expand all</button>
    <button onclick="collapseAll()">Collapse all</button>
    <button id="snap-btn" onclick="toggleSnap()">Snap</button>
  </div>
</div>
<div id="main">
  <div id="tree-panel">
    <svg id="tree-svg"></svg>
    <div id="legend">
      <div class="legend-row"><div class="lc lc-family"></div>Role family</div>
      <div class="legend-row"><div class="lc lc-role"></div>Role</div>
      <div class="legend-row"><div class="lc lc-cap"></div>Capability</div>
      <div class="legend-row"><div class="lc lc-sfia"></div>SFIA skill</div>
    </div>
  </div>
  <div id="detail-panel" class="hidden">
    <button id="close-detail" onclick="closeDetail()">✕</button>
    <div id="detail-content"></div>
  </div>
</div>
<script src="explorer.js?v=1782069259"></script>
</body>
</html>
